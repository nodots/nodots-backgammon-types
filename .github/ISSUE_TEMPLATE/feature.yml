name: Feature request
description: Propose a new feature or enhancement
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form to propose a new feature or an improvement to an
        existing one. Bug reports belong on the separate "Bug report" form.

  - type: input
    id: package
    attributes:
      label: Target package or component
      description: Which package or area would this feature live in?
      placeholder: "@nodots/backgammon-core, web app, CLI, etc."
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What use case or friction does this address?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would the feature work? Include API shape if relevant.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered and why you ruled them out.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Mockups, links to related issues, prior art.
    validations:
      required: false
